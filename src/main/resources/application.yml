# 服务器配置
server:
  port: 8080

# 数据源配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/street_map?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456  # ⚠️ 改成你的 MySQL 密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置（如果使用 JPA）
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.streetmap.backend.entity
  configuration:
    map-underscore-to-camel-case: true

# JWT 配置
jwt:
  secret: your-secret-key-here-must-be-at-least-32-characters-long
  expiration: 86400000  # 24 小时

# 日志配置
logging:
  level:
    com.streetmap.backend: debug
    com.mysql: debug